name: Pull and Save Docker Images

on:
  workflow_dispatch:

jobs:
  pull-save:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and save images
        run: |
          docker pull node:22-alpine
          docker save node:22-alpine -o node-22-alpine.tar
          docker pull nginx:1.26.3-alpine
          docker save nginx:1.26.3-alpine -o nginx-1.26.3-alpine.tar

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            node-22-alpine.tar
            nginx-1.26.3-alpine.tar
          retention-days: 1
